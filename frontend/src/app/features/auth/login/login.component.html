<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
    <div class="text-center mb-6">
      <h2 class="text-2xl font-bold text-gray-900">DataHeartSC</h2>
      <p class="text-sm text-gray-500 mt-1">Inicia sesión en tu cuenta</p>
    </div>
    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
        <input formControlName="email" type="email" placeholder="usuario@fundacion.org"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
        <input formControlName="password" type="password"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500" />
      </div>
      @if (error()) {
        <p class="text-sm text-red-600">{{ error() }}</p>
      }
      <button type="submit" [disabled]="loading()"
              class="w-full bg-brand-600 hover:bg-brand-700 text-white font-medium py-2 rounded-lg text-sm transition-colors disabled:opacity-50">
        {{ loading() ? 'Ingresando...' : 'Iniciar sesión' }}
      </button>
    </form>
  </div>
</div>
