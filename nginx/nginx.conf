worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

  # Rate limiting — protección básica
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=webhooks:10m rate=60r/m;

  # Redirigir HTTP → HTTPS
  server {
    listen 80;
    server_name sc.danielflorez.dev;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name sc.danielflorez.dev;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Seguridad headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Subir archivos hasta 10 MB (PDFs, Excel)
    client_max_body_size 10M;

    # ── API — proxy al backend NestJS ────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://backend:3000/api/;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection keep-alive;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    # ── Webhooks — sin rate limit estricto (Shopify, Wompi, PayU) ─
    location /api/webhooks/ {
      limit_req zone=webhooks burst=30 nodelay;
      proxy_pass         http://backend:3000/api/webhooks/;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      # Mantener el body crudo para validación HMAC
      proxy_request_buffering off;
    }

    # ── Archivos estáticos de uploads (certificados PDF) ─────────
    location /uploads/ {
      alias /app/uploads/;
      add_header Cache-Control "private, no-store";
      # Sólo PDFs — acceso directo bloqueado; el backend sirve con JWT
      return 403;
    }

    # ── Angular SPA ───────────────────────────────────────────────
    location / {
      root   /usr/share/nginx/html;
      index  index.html;
      try_files $uri $uri/ /index.html;

      # Cache agresivo para assets con hash
      location ~* \.(js|css|woff2?|ttf|svg|ico|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
      }
    }
  }
}
